<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qontex Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app-container">
    <div class="video-container" id="twitch-embed"></div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-title">Stream Chat & Qontex</div>
            <div class="filters">
                <button class="filter-btn active" onclick="toggleFilter('all')">All</button>
                <button class="filter-btn" onclick="toggleFilter('chat')">Chat</button>
                <button class="filter-btn" onclick="toggleFilter('transcript')">Transcript</button>
                <button class="filter-btn" onclick="toggleFilter('qontex')">Qontex</button>
            </div>
        </div>
        
        <div class="chat-messages" id="chat-box">
            <div class="message-row msg-chat" data-type="chat">
                <span class="badge" style="background-color: red;" title="Broadcaster Badge Dummy"></span>
                <span class="badge" style="background-color: blue;" title="Palsona Badge Dummy"></span>
                <span class="username">Viewer123:</span>
                <span class="message-text">This is a regular chat message! LULW</span>
            </div>

            <div class="message-row msg-transcript" data-type="transcript">
                <span class="username">[TRANSCRIPT]:</span>
                <span class="message-text">Okay, so let's head into the next room and see what we can find.</span>
            </div>

            <div class="message-row msg-qontex" data-type="qontex">
                <span class="badge" style="background-color: #9146ff;" title="Bot Badge Dummy"></span>
                <span class="username">Qontex:</span>
                <span class="message-text">Viewer123 asked about the room. Based on the context, there are two Mosscreeps and a Pale Ore inside.</span>
            </div>
        </div>
    </div>
</div>

<script src="https://embed.twitch.tv/embed/v1.js"></script>
<script>
    // 1. Initialize the Twitch Player
    // NOTE: If testing locally, 'localhost' MUST be in the parent array
    new Twitch.Embed("twitch-embed", {
        width: "100%",
        height: "100%",
        channel: "monstercat", // Replace with your target streamer
        layout: "video",       // Video only, we are replacing their chat
        autoplay: true,
        parent: ["localhost", "127.0.0.1"] // Required by Twitch for security
    });

    // 2. Simple Filter Logic
    function toggleFilter(filterType) {
        // Update button UI
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        // Filter messages
        const messages = document.querySelectorAll('.message-row');
        messages.forEach(msg => {
            if (filterType === 'all') {
                msg.style.display = 'block';
            } else {
                msg.style.display = msg.getAttribute('data-type') === filterType ? 'block' : 'none';
            }
        });
        scrollToBottom();
    }

    // 3. Auto-Scroll Logic
    function scrollToBottom() {
        const chatBox = document.getElementById('chat-box');
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // 4. WebSocket Payload Example

        // Append to #chat-box
        // Call scrollToBottom()
    };
    */
</script>
</body>
</html>
